spring.application.name=NotificationSystem

server.port=8080

spring.profiles.active=local

# MySQL defaults; override via env in real environments.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/notification_system?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Kafka defaults.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:notification-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.notificationsystem.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.notificationsystem.event.NotificationEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Redis defaults.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s

app.kafka.notification-topic=${KAFKA_NOTIFICATION_TOPIC:notification-send}
app.kafka.retry-topic=${KAFKA_RETRY_TOPIC:notification-retry}
app.kafka.dlq-topic=${KAFKA_DLQ_TOPIC:notification-dlq}

app.retry.max-attempts=${MAX_RETRY_ATTEMPTS:3}
app.rate-limit.max-per-minute=${RATE_LIMIT_PER_MINUTE:5}
app.cache.preference-ttl-minutes=${PREFERENCE_CACHE_TTL_MINUTES:30}
app.cache.idempotency-ttl-hours=${IDEMPOTENCY_CACHE_TTL_HOURS:24}

app.health.kafka-timeout-seconds=${KAFKA_HEALTH_TIMEOUT_SECONDS:3}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

info.app.name=${spring.application.name}

